<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Calgary Pop-Up Care Village</title>
    <!--
      Single Page Apps for GitHub Pages
      https://github.com/rafgraph/spa-github-pages
      Redirects deep links back to index.html so the React router can handle them.
      Custom domain served at root => keep 0 path segments.
    -->
    <script>
      (function (l) {
        var pathSegmentsToKeep = 0;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + pathSegmentsToKeep)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
